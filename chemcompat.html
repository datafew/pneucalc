<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elastomer - Kimyasal Uyumluluk Rehberi</title>
    <style>
        :root {
            /* Softer palette + thin gridlines (inspired by "Chemical Compatibility Checker" export) */
            --success-rgb: 52, 199, 89;   /* green */
            --primary-rgb: 10, 132, 255;  /* blue */
            --warning-rgb: 255, 204, 0;   /* yellow */
            --danger-rgb: 255, 59, 48;    /* red */
            --na-rgb: 148, 163, 184;      /* muted slate */

            --success: rgb(var(--success-rgb));
            --primary: rgb(var(--primary-rgb));
            --warning: rgb(var(--warning-rgb));
            --danger: rgb(var(--danger-rgb));
            --na: rgb(var(--na-rgb));

            /* Page surfaces */
            --background: #ffffff;
            --text: #111827;
            --border: #e5e7eb; /* subtle grid / outline */
            --card: #f8fafc;

            /* Zebra rows */
            --row-odd: #ffffff;
            --row-even: #f8fafc;

            /* Sticky offsets (JS updates --headH; --noW optional) */
            --headH: 0px;
            --noW: 44px;
            --chemW: 300px;
            --stateW: 60px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #0b0b0f;
                --text: #e6e6e6;
                --border: #2a2f3a;
                --card: #151821;

                --row-odd: #151821;
                --row-even: #10131a;

                /* slightly brighter accents on dark bg */
                --success-rgb: 45, 205, 115;
                --primary-rgb: 63, 160, 255;
                --warning-rgb: 255, 201, 74;
                --danger-rgb: 255, 107, 107;
                --na-rgb: 154, 160, 166;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }

        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 1020px; /* Fits the 1004px table + padding precisely */
            margin: 0 auto;
            padding: 0 8px;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            margin: 0 0 12px 0;
            color: #475569;
            line-height: 1.45;
        }

        @media (prefers-color-scheme: dark) {
            .subtitle {
                color: #9aa0a6;
            }
        }

        .table-toolbar {
            position: sticky;
            top: 0;
            /* z-index > all sticky thead/td cells so the toolbar always renders
               on top — this hides the 2px overlap used by the thead trick below */
            z-index: 80;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }

        @media (prefers-color-scheme: dark) {
            .table-toolbar {
                background: rgba(11, 11, 15, 0.94);
                box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.25);
            }
        }

        .table-toolbar .toolbar-inputs-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0 6px 0;
            flex-wrap: nowrap;
        }

        .table-toolbar .toolbar-inputs-row input[type="search"] {
            flex: 1;
            min-width: 0;
        }

        .table-toolbar .toolbar-inputs-row select#material {
            flex: 1;
            min-width: 0;
            width: auto;
        }

        .table-toolbar .toolbar-filters-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 4px 0 10px 0;
            flex-wrap: nowrap;
        }

        .legend-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .legend-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: nowrap;
        }

        .legend-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            opacity: 0.85;
            white-space: nowrap;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            color: var(--text);
            font-size: 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            transition: opacity 150ms ease, background-color 150ms ease, border-color 150ms ease;
            user-select: none;
            opacity: 0.35;
        }

        .legend-item.active {
            opacity: 1;
            background: color-mix(in oklab, var(--card) 45%, transparent);
            border-color: var(--border);
        }

        .legend-item:hover {
            opacity: 0.85;
            background: color-mix(in oklab, var(--card) 60%, transparent);
        }
        .legend-item.active:hover {
            opacity: 1;
            background: color-mix(in oklab, var(--card) 80%, transparent);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot.g { background: var(--success); }
        .dot.f { background: var(--primary); }
        .dot.p { background: var(--warning); }
        .dot.b { background: var(--danger); }
        .dot.n { background: transparent; outline: 1px solid var(--na); }

        input[type="search"], select {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--background);
            color: var(--text);
        }

        @media (prefers-color-scheme: dark) {
            input[type="search"], select {
                background: var(--card);
            }
        }

        .table-toolbar input[type="search"] {
            min-width: 120px;
        }

        .table-toolbar select {
            min-width: 120px;
        }

        #counter {
            margin-left: auto;
            white-space: nowrap;
            font-weight: 600;
            color: #475569;
            font-size: 12px;
        }

        @media (prefers-color-scheme: dark) {
            #counter {
                color: #9aa0a6;
            }
        }

        .table-wrap {
            padding-bottom: 10px; /* top padding removed: would create a gap where scrolling rows bleed through */
        }

        .table-container {
            overflow: visible;
            background: var(--background);
        }

        table {
            width: 100%;
            min-width: max-content;
            /* border-separate + border-spacing:0 instead of collapse:
               prevents the Chrome/Safari bug where position:sticky thead
               visually floats away from the table body on scroll. */
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            font-size: 12px;
            font-weight: 400;
            /* No outer border here: in separate mode table border stacks with
               td borders and creates double lines. The frame is rebuilt below. */
            /* contain:style limits CSS custom property recalc scope to the table */
            contain: style;
        }

        /* isolation:isolate on each row creates a stacking context, allowing
           the browser to repaint ONLY the hovered row's composite layer
           instead of invalidating the entire table on background-color change */
        tbody tr { isolation: isolate; }

        th, td {
            text-align: center;
            vertical-align: middle;
            height: 32px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        /* Reconstruct outer frame from cell level (no double lines) */
        thead th:first-child, td:first-child { border-left: 1px solid var(--border); }
        thead th { border-top: 1px solid var(--border); }

        thead tr, tbody tr { height: 32px; }


        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Sticky header styles */
        thead th {
            position: -webkit-sticky;
            position: sticky;
            /* Stick 2px EARLIER than the toolbar bottom. Those top 2px slide
               behind the toolbar (z-index 80 > 60) and are never visible.
               This guarantees zero gap regardless of subpixel rounding on
               any display DPI, without any JS timing dependency. */
            top: calc(var(--headH) - 2px);
            background: #fafafa;
            font-weight: 600;
            padding: 4px;
            font-size: 12px;
            line-height: 1.5;
            white-space: nowrap;
            z-index: 60;
            border-bottom: none;
            box-shadow: 0 1px 0 var(--border);
        }

        .sort-arrow {
            margin-left: 4px;
            opacity: 0.85;
            display: inline-block;
        }

        @media (prefers-color-scheme: dark) {
            thead th {
                background: #0f1421;
                color: #cbd5e1;
            }
        }

        /* With border-collapse:separate the first tbody row no longer inherits
           a shared border from thead — no extra rule needed here. */

        /* Keep base rows transparent; stripe sticky columns only (match export) */

        td {
            /* Flexible table cells: avoid fixed small height which causes layout shifts
               (was causing chemical name to overflow into the sticky No column). */
            padding: 4px;
            margin: 0;
            box-sizing: border-box;
            vertical-align: middle;
            white-space: nowrap; /* keep single-line cells to avoid row height jumps */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tbody tr {
            scroll-snap-align: start;
            scroll-margin-top: calc(var(--headH) + 32px);
        }

        /* Sticky columns (match export sizing) */
        .no-col, .no-cell { width: var(--noW); min-width: var(--noW); max-width: var(--noW); }

        /* Make No column sticky */
        th.no-col {
            position: -webkit-sticky;
            position: sticky;
            left: 0;
            z-index: 72;
            padding: 4px 4px;
            text-align: center;
            min-width: var(--noW);
        }
        
        /* Sticky column styles */
        td.no-cell {
            position: -webkit-sticky;
            position: sticky;
            left: 0;
            background: #fbfbfd;
            text-align: center;
            padding: 4px 4px;
            z-index: 40;
        }

        /* Name cell styles */
        th.name-cell {
            position: -webkit-sticky;
            position: sticky;
            left: var(--noW);
            z-index: 71;
            min-width: var(--chemW);
            text-align: left;
        }

        td.name-cell {
            position: -webkit-sticky;
            position: sticky;
            left: var(--noW);
            z-index: 39;
            background: #fbfbfd;
            min-width: var(--chemW);
            padding: 4px 6px !important;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tbody tr:nth-child(even) td.no-cell,
        tbody tr:nth-child(even) td.name-cell {
            background: #f7f9fc;
        }

        @media (prefers-color-scheme: dark) {
            td.no-cell,
            th.no-col {
                background: #0f1320;
                color: #e6e9f0;
            }

            td.name-cell {
                background: #0f1320;
                color: #e7eaf0;
            }

            tbody tr:nth-child(even) td.no-cell,
            tbody tr:nth-child(even) td.name-cell {
                background: #0d111b;
            }
        }

        /* rating classes are applied to the TD itself so the cell is colored */
        .rating {
            padding: 0;
        }
        /* Rating fills (match "Chemical Compatibility Checker" export) */
        td.rating-5 { background-color: rgba(var(--success-rgb), 0.55); }
        td.rating-4 { background-color: rgba(var(--primary-rgb), 0.50); }
        td.rating-3 { background-color: rgba(var(--warning-rgb), 0.55); }
        td.rating-2 { background-color: rgba(var(--danger-rgb), 0.55); }
        td.rating-1 { background-color: transparent; }

        @supports (background: color-mix(in oklab, white 50%, black)) {
            @media (prefers-color-scheme: dark) {
                td.rating-5 { background-color: color-mix(in oklab, var(--success) 60%, #000); }
                td.rating-4 { background-color: color-mix(in oklab, var(--primary) 52%, #000); }
                td.rating-3 { background-color: color-mix(in oklab, var(--warning) 58%, #000); }
                td.rating-2 { background-color: color-mix(in oklab, var(--danger) 58%, #000); }
                td.rating-1 { background-color: transparent; }
            }
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #64748b;
        }

        /* Mobile-only responsive styles (avoid affecting desktop window resizing) */
        @media (max-width: 1024px) {
            :root { --noW: 26px; --chemW: 86px; --stateW: 18px; }
            h1 {
                font-size: 1.5rem;
                margin-bottom: 0.75rem;
            }

            /* On tablets/intermediate widths, wrap toolbar elements so they fit */
            .table-toolbar .toolbar-inputs-row {
                gap: 10px;
                padding: 8px 0 4px 0;
            }

            .table-toolbar .toolbar-filters-row {
                flex-wrap: wrap;
                gap: 8px 12px;
                padding: 4px 0 8px 0;
            }

            .table-toolbar .toolbar-filters-row #counter {
                margin-left: 0;
            }

            .legend-group {
                background: color-mix(in oklab, var(--card) 60%, transparent);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 6px 10px;
            }

            /* Table adjustments for mobile/tablet */
            .table-container {
                border-radius: 0.375rem;
                margin: 0;
                overflow-x: auto;
                overflow-y: visible;
                -webkit-overflow-scrolling: touch;
                overscroll-behavior-x: contain;
            }

            /* Mobile sticky header: a separate sticky div above .table-container.
               JS clones the thead here. */
            .mobile-sticky-head {
                display: none; /* shown only when JS adds body.mobile-head-active */
                position: sticky;
                top: calc(var(--headH) - 2px);
                z-index: 60;
                background: var(--background);
            }
            body.mobile-head-active .mobile-sticky-head { display: block; }
            body.mobile-head-active #data-table thead   { display: none; }

            .mobile-sticky-head .head-scroller {
                overflow-x: auto;
                overflow-y: hidden;
                scrollbar-width: none;
            }
            .mobile-sticky-head .head-scroller::-webkit-scrollbar { display: none; }

            th.name-cell,
            td.name-cell {
                min-width: var(--chemW);
            }

            th.elastomer, td.elastomer { padding: 2px; }

            thead th {
                font-size: 11px;
                padding: 3px;
                line-height: 1.25;
            }

            /* Mobile: elastomer headers go vertical to save horizontal space */
            thead th.elastomer {
                writing-mode: vertical-rl;
                text-orientation: mixed;
                font-size: 10px;
                line-height: 1;
                padding: 6px 0 18px; /* Extra bottom padding for arrow space */
                height: 80px; /* Slightly taller for clear separation */
                position: relative;
                top: 0; /* Reset inherited sticky top offset to prevent black overlaps */
            }

            thead th.elastomer .sort-arrow {
                position: absolute;
                bottom: 4px;
                left: 0;
                right: 0;
                margin-left: 0;
                text-align: center;
                display: block;
                writing-mode: horizontal-tb; /* Restores normal horizontal text alignment context for centering */
            }
        }

        /* 480px (Mobile Phones) and smaller viewport styling */
        @media (max-width: 480px) {
            .table-container {
                overflow-x: hidden; /* Prevent horizontal scrolling entirely on phones */
            }

            th.no-col,
            td.no-cell {
                font-size: 10px;
                padding: 4px 2px;
            }

            th.name-cell,
            td.name-cell {
                min-width: var(--chemW);
                text-overflow: ellipsis;
                white-space: nowrap;
                overflow: hidden;
                cursor: pointer;
                font-size: 10px;
            }

            /* Feedback on tap */
            td.name-cell:active {
                background: color-mix(in oklab, var(--border) 35%, transparent) !important;
            }

            .table-toolbar .toolbar-inputs-row {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 8px 0 4px 0;
            }

            .table-toolbar .toolbar-filters-row {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 4px 0 12px 0;
            }

            .table-toolbar .toolbar-inputs-row input[type="search"],
            .table-toolbar .toolbar-inputs-row select#material {
                width: 100% !important;
                min-width: 0 !important;
                flex: none;
            }

            .table-toolbar .toolbar-filters-row #counter {
                text-align: center;
                margin-top: 4px;
            }

            .legend-group {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 6px;
                background: color-mix(in oklab, var(--card) 60%, transparent);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 8px;
            }

            .legend-title {
                font-size: 10px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                opacity: 0.6;
                margin-bottom: 2px;
                text-align: center; /* Center on mobile */
            }

            .legend-inline {
                width: 100%;
                flex-wrap: nowrap; /* Force single line to fit */
                gap: 4px;
                justify-content: center; /* Center on mobile */
            }

            .legend-item {
                font-size: 10px;
                padding: 2px 4px;
                gap: 4px;
            }

            .legend-item .dot {
                width: 8px;
                height: 8px;
            }

            #counter {
                align-self: flex-start;
                margin-left: 0;
                font-size: 11px;
            }
        }

        @media (hover: hover) {
            /* Cell highlight: inset box-shadow instead of outline.
               outline renders OUTSIDE the box → the row below paints over its
               bottom edge, making it invisible. inset shadow renders entirely
               inside the cell border, never clipped by adjacent cells.
               box-shadow has no layout cost and no transition needed. */
            td.rating:hover {
                box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.6);
            }

            tr:hover td { background-color: #f5f7fb; }
            tr:hover td.rating-5 { background-color: rgba(var(--success-rgb), 0.72); }
            tr:hover td.rating-4 { background-color: rgba(var(--primary-rgb), 0.68); }
            tr:hover td.rating-3 { background-color: rgba(var(--warning-rgb), 0.72); }
            tr:hover td.rating-2 { background-color: rgba(var(--danger-rgb), 0.72); }
            tr:hover td.rating-1 { background-color: transparent; }

            th.no-col:hover { background: var(--background); }
        }

        @media (hover: hover) and (prefers-color-scheme: dark) {
            /* Pre-computed hover colors replace filter:brightness(1.05).
               filter forces a GPU composite layer per cell (11 layers/row).
               Explicit background-color is a simple paint op — no extra layers. */
            tr:hover td { background-color: #1a1f30; }
            tr:hover td.no-cell,
            tr:hover td.name-cell { background-color: #0b1020; }
            tr:hover td.rating-5 { background-color: rgba(45, 205, 115, 0.30); }
            tr:hover td.rating-4 { background-color: rgba(63, 160, 255, 0.26); }
            tr:hover td.rating-3 { background-color: rgba(255, 201, 74, 0.30); }
            tr:hover td.rating-2 { background-color: rgba(255, 107, 107, 0.30); }
            tr:hover td.rating-1 { background-color: transparent; }
        }

        /* Elastomer columns (match export) */
        th.elastomer, td.elastomer {
            width: var(--stateW);
            min-width: var(--stateW);
            max-width: var(--stateW);
            padding: 2px;
        }

        col.col-no { width: var(--noW); }
        col.col-chem { width: var(--chemW); }
        col.col-state { width: var(--stateW); }

        .notice {
            margin: 1rem 0;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            background: var(--card);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .notice strong {
            display: inline-block;
            margin-bottom: 0.35rem;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        footer {
            margin: 2rem 0 1.5rem;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
            color: var(--text);
            font-size: 0.9rem;
            text-align: center;
        }

        .scroll-nav {
            position: fixed;
            right: 14px;
            bottom: 70px; /* clears the fixed .signature bar (~44px) + 14px gap */
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 210; /* above .signature (z-index: 200) */
        }

        .scroll-nav button {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: color-mix(in oklab, var(--card) 85%, transparent);
            color: var(--text);
            display: grid;
            place-items: center;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.16);
            backdrop-filter: blur(6px);
            transition: transform 120ms ease, opacity 160ms ease;
        }

        .scroll-nav button:hover { transform: translateY(-1px); }
        .scroll-nav button:active { transform: translateY(0); }
        .scroll-nav button:focus-visible { outline: 2px solid rgba(var(--primary-rgb), 0.55); outline-offset: 2px; }
        .scroll-nav button svg { width: 18px; height: 18px; }

        .scroll-nav button.is-hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(6px);
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .scroll-nav button { transition: none; }
        }

        /* Centered Details Modal Styles */
        .bottom-sheet {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 220ms ease;
        }

        .bottom-sheet.active {
            pointer-events: auto;
            opacity: 1;
        }

        .bottom-sheet-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
        }

        .bottom-sheet-content {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            max-height: 85vh;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.05);
            transform: scale(0.92) translateY(10px);
            transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .bottom-sheet.active .bottom-sheet-content {
            transform: scale(1) translateY(0);
        }

        .bottom-sheet-drag-handle {
            display: none;
        }

        .bottom-sheet-header {
            position: relative;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            margin-bottom: 14px;
            padding: 0 24px;
        }

        .modal-title-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex: 1;
        }

        .bottom-sheet-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            line-height: 1.35;
        }

        .bottom-sheet-subtitle {
            font-size: 11px;

    <script>

    const materials = ["FFKM", "ETP", "FKM", "NBR", "HNBR", "EPDM", "TFE\\P", "VMQ", "FVMQ", "AU", "PTFE"];
    const materialFullNames = {
        "FFKM": "Perfluoroelastomer",
        "ETP": "Fluoroelastomer (Viton Extreme)",
        "FKM": "Fluoroelastomer (Viton Type A)", 
        "NBR": "Nitrile Butadiene Rubber",
        "HNBR": "Hydrogenated Nitrile Butadiene Rubber",
        "EPDM": "Ethylene Propylene Diene Monomer",
        "TFE\\P": "Tetrafluoroethylene Propylene (Aflas)",
        "VMQ": "Silicone Rubber",
        "FVMQ": "Fluorosilicone Rubber",
        "AU": "Polyester Urethane",
        "PTFE": "Polytetrafluoroethylene (Teflon)"
    };
    const ratingLabels = {
        5: "İyi - Malzemenin kimyasal direnci iyidir",
        4: "Orta - Sınırlı maruz kalma kabul edilebilir",
        3: "Zayıf - Sürekli kullanım için önerilmez",
        2: "Uygun Değil - Bu kimyasalla kullanılmamalıdır",
        1: "Veri Yok - Uygun veri bulunamadı"
    };
    let data = [];
    let sortState = { key: null, dir: 1 };
    let toolbarRO = null;
    const selectedRatings = new Set();
    let legendButtons = [];

    
    function setHeadOffset() {
        const bar = document.querySelector('.table-toolbar');
        // Use the raw fractional value — CSS handles sub-pixel px values natively.
        // Math.ceil was rounding UP by 1-2px, which pushed the sticky thead
        // below the toolbar and created a gap through which scrolling rows bled.
        const height = bar ? bar.getBoundingClientRect().height : 0;
        document.documentElement.style.setProperty('--headH', `${height}px`);
    }

    function startToolbarObserver() {
        const bar = document.querySelector('.table-toolbar');
        if (!bar || typeof ResizeObserver === 'undefined') return;
        if (toolbarRO) toolbarRO.disconnect();
        toolbarRO = new ResizeObserver(() => setHeadOffset());
        toolbarRO.observe(bar);
    }

    function syncLayoutVars() {
        setHeadOffset();
    }

    window.addEventListener('DOMContentLoaded', () => {
        syncLayoutVars();
        startToolbarObserver();
        initScrollNav();
        setupMobileStickyHeader();
        initLegendFilters();
    });
    window.addEventListener('load', syncLayoutVars);
    window.addEventListener('resize', () => { syncLayoutVars(); setupMobileStickyHeader(); });

    // --- Mobile sticky header (JS-assisted) ---
    // CSS-only position:sticky breaks inside overflow-x:auto containers.
    // This minimal helper clones the thead into a sibling div that is NOT
    // inside the overflow container, so it sticks relative to the viewport.
    function setupMobileStickyHeader() {
        const host      = document.getElementById('mobile-sticky-head');
        const mainTable = document.getElementById('data-table');
        const scroller  = document.querySelector('.table-container');
        if (!host || !mainTable || !scroller) return;

        const isMobile = window.innerWidth <= 1024;

        if (!isMobile) {
            host.hidden = true;
            host.innerHTML = '';
            host.dataset.ready = '0';
            document.body.classList.remove('mobile-head-active');
            return;
        }

        host.hidden = false;
        if (host.dataset.ready === '1') return; // already set up

        const colgroup = mainTable.querySelector('colgroup');
        const thead    = mainTable.querySelector('thead');
        if (!colgroup || !thead) return;

        host.innerHTML = `<div class="head-scroller"><table id="sticky-head-table">${colgroup.outerHTML}${thead.outerHTML}</table></div>`;
        host.dataset.ready = '1';
        document.body.classList.add('mobile-head-active');

        // Re-attach sort handlers (outerHTML copies attributes, not event listeners)
        host.querySelectorAll('th[data-sort-bound]').forEach(th => delete th.dataset.sortBound);
        attachSortHandlersFor('#sticky-head-table');

        // Bidirectional horizontal scroll sync
        const headScroller = host.querySelector('.head-scroller');
        let syncing = false;
        scroller.addEventListener('scroll', () => {
            if (syncing || !headScroller) return;
            syncing = true;
            headScroller.scrollLeft = scroller.scrollLeft;
            requestAnimationFrame(() => { syncing = false; });
        }, { passive: true });
        if (headScroller) {
            headScroller.addEventListener('scroll', () => {
                if (syncing) return;
                syncing = true;
                scroller.scrollLeft = headScroller.scrollLeft;
                requestAnimationFrame(() => { syncing = false; });
            }, { passive: true });
        }
    }

    function initScrollNav() {
        const topBtn = document.getElementById('scrollTopBtn');
        const bottomBtn = document.getElementById('scrollBottomBtn');
        if (!topBtn || !bottomBtn) return;

        const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const scrollToPos = (top) => window.scrollTo({ top, behavior: prefersReduced ? 'auto' : 'smooth' });

        const update = () => {
            const doc = document.documentElement;
            const max = Math.max(0, doc.scrollHeight - window.innerHeight);
            const y = window.scrollY || doc.scrollTop || 0;
            topBtn.classList.toggle('is-hidden', y <= 24);
            bottomBtn.classList.toggle('is-hidden', (max - y) <= 24);
        };

        topBtn.addEventListener('click', () => scrollToPos(0));
        bottomBtn.addEventListener('click', () => scrollToPos(document.documentElement.scrollHeight));

        window.addEventListener('scroll', update, { passive: true });
        window.addEventListener('resize', update);
        update();
    }

        // Initialize material select
        const materialSelect = document.getElementById("material");
        if (materialSelect) {
            materials.forEach(mat => {
                const option = document.createElement("option");
                option.value = mat;
                option.textContent = `${mat} - ${materialFullNames[mat]}`;
                materialSelect.appendChild(option);
            });
        }

    // Load and parse CSV data
        async function loadData() {
            try {
                const response = await fetch("assets/data/chemresist.txt");
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                
                data = text.split(/\r?\n/)
                    .filter(line => line && !line.startsWith("#"))
                    .map(line => {
                        const [name, ratings] = line.split("|").map(s => s.trim());
                        if (!name || !ratings) return null;
                        if (ratings.length !== 11) return null; // Must be exactly 11 digits
                        return {
                            name: name,
                            ratings: ratings.split("").map(r => {
                                const n = parseInt(r, 10);
                                return (n >= 1 && n <= 5) ? n : 1;
                            })
                        };
                    })
                    .filter(Boolean) // Remove nulls
                    .map((item, idx) => ({ ...item, id: idx + 1 })); // stable ID from source order
                
                renderTable();
                updateCounter();
                attachSortHandlersFor('#data-table');
            } catch (error) {
                console.error("Veri yüklenirken hata:", error);
                document.querySelector("tbody").innerHTML = 
                    '<tr><td colspan="13" class="loading">Veri yüklenemedi!</td></tr>';
            }
        }

        function updateCounter(filteredCount) {
            const cnt = document.getElementById('counter');
            const total = data.length || 0;
            const shown = (typeof filteredCount === 'number') ? filteredCount : total;
            if (cnt) cnt.textContent = `Gösterilen: ${shown} / ${total}`;
        }

        // Render table with filtered data
        function renderTable() {
            const searchTerm = document.getElementById("search").value.toLowerCase().trim();
            const selectedMaterial = document.getElementById("material").value;

            const filtered = data.filter(item => {
                // Text search filter
                if (searchTerm) {
                    const idMatch = String(item.id || "").includes(searchTerm);
                    const nameMatch = item.name.toLowerCase().includes(searchTerm);
                    if (!idMatch && !nameMatch) return false;
                }
                
                // Rating filter (selectedRatings Set)
                if (selectedRatings.size > 0) {
                    if (selectedMaterial) {
                        // If material is selected, check only that material's rating
                        const index = materials.indexOf(selectedMaterial);
                        if (!selectedRatings.has(item.ratings[index])) return false;
                    } else {
                        // If only rating is selected (no material), check that every available rating (excluding N/A: 1)
                        // matches the selected set, and there's at least one match (not all 1s).
                        const hasMatch = item.ratings.some(r => selectedRatings.has(r));
                        const noMismatch = item.ratings.every(r => r === 1 || selectedRatings.has(r));
                        if (!hasMatch || !noMismatch) return false;
                    }
                } else if (selectedMaterial) {
                    // If only material is selected (no rating), include all its ratings
                    const index = materials.indexOf(selectedMaterial);
                    if (item.ratings[index] < 1) return false;
                }
                
                return true;
            });

            // Apply sorting if requested
            if (sortState.key !== null) {
                const d = sortState.dir;
                filtered.sort((a, b) => {
                    if (sortState.key === 'id') {
                        return (a.id - b.id) * d;
                    }
                    if (sortState.key === 'name') {
                        const cmp = a.name.localeCompare(b.name);
                        return cmp !== 0 ? cmp * d : (a.id - b.id);
                    }
                    if (sortState.key.startsWith('r')) {
                        const c = parseInt(sortState.key.slice(1), 10);
                        const va = a.ratings[c] || 0;
                        const vb = b.ratings[c] || 0;
                        if (va === vb) return a.name.localeCompare(b.name);
                        return (va - vb) * d;
                    }
                    return 0;
                });
            }

            const tbody = document.querySelector("tbody");
            tbody.innerHTML = filtered.map((item, idx) => `
                <tr>
                    <td class="no-cell">${item.id}</td>
                    <td class="name-cell" title="${item.name}">${item.name}</td>
                            ${item.ratings.map(rating => `
                                <td class="rating elastomer rating-${rating}" title="${ratingLabels[rating]}"></td>
                            `).join("")}
                </tr>
            `).join("");

            updateCounter(filtered.length);
            updateSortIndicators();
        }

        // Event listeners
        document.getElementById("search").addEventListener("input", renderTable);
        document.getElementById("material").addEventListener("change", renderTable);

        function initLegendFilters() {
            legendButtons = Array.from(document.querySelectorAll('.legend-inline .legend-item'));
            legendButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const r = parseInt(btn.dataset.rating, 10);
                    if (selectedRatings.has(r)) {
                        selectedRatings.delete(r);
                    } else {
                        selectedRatings.add(r);
                    }
                    updateLegendButtons();
                    renderTable();
                });
            });
            updateLegendButtons();
        }

        function updateLegendButtons() {
            legendButtons.forEach(btn => {
                const r = parseInt(btn.dataset.rating, 10);
                if (selectedRatings.size === 0) {
                    btn.classList.add('active');
                } else {
                    btn.classList.toggle('active', selectedRatings.has(r));
                }
            });
        }

        function attachSortHandlersFor(tableSel) {
            const root = document.querySelector(tableSel);
            if (!root) return;
            const ths = Array.from(root.querySelectorAll('thead th'));
            ths.forEach((th, i) => {
                if (th.dataset.sortBound === '1') return;
                let key = null;
                if (th.classList.contains('no-col')) key = 'id';
                else if (th.classList.contains('name-cell')) key = 'name';
                else if (i >= 2) key = `r${i - 2}`; // elastomer columns

                if (!key) return;
                th.style.cursor = 'pointer';
                th.tabIndex = 0;
                th.setAttribute('role', 'button');
                th.setAttribute('aria-sort', 'none');
                th.dataset.sortBound = '1';
                th.addEventListener('click', () => {
                    if (sortState.key === key) {
                        sortState.dir = -sortState.dir; // toggle
                    } else {
                        sortState.key = key;
                        sortState.dir = -1; // default desc
                    }
                    renderTable();
                });
                th.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        th.click();
                    }
                });
            });
        }

        function updateSortIndicators() {
            const apply = (rootSel) => {
                const root = document.querySelector(rootSel);
                if (!root) return;
                const ths = Array.from(root.querySelectorAll('thead th'));
                ths.forEach((th, i) => {
                let key = null;
                if (th.classList.contains('no-col')) key = 'id';
                else if (th.classList.contains('name-cell')) key = 'name';
                else if (i >= 2) key = `r${i - 2}`;

                const base = th.dataset.label || th.textContent.replace(/\s*[▲▼]$/,'');
                th.dataset.label = base;
                if (sortState.key === key) {
                    const arrow = sortState.dir === -1 ? '▼' : '▲';
                    th.innerHTML = `${base}<span class="sort-arrow">${arrow}</span>`;
                    th.setAttribute('aria-sort', sortState.dir === -1 ? 'descending' : 'ascending');
                } else {
                    th.innerHTML = base;
                    th.setAttribute('aria-sort', 'none');
                }
                });
            };
            apply('#data-table');
            if (document.getElementById('sticky-head-table')) apply('#sticky-head-table');
        }

        // Event delegation for chemical details popup/bottom sheet
        document.querySelector("#data-table").addEventListener("click", (e) => {
            const nameCell = e.target.closest("td.name-cell");
            if (nameCell) {
                const tr = nameCell.closest("tr");
                const id = parseInt(tr.querySelector(".no-cell").textContent, 10);
                const item = data.find(x => x.id === id);
                if (item) {
                    openBottomSheet(item);
                }
            }
        });

        function openBottomSheet(item) {
            const sheet = document.getElementById("bottom-sheet");
            const title = document.getElementById("sheet-title");
            const subtitle = document.getElementById("sheet-subtitle");
            const grid = document.getElementById("sheet-grid");

            title.textContent = item.name;
            if (subtitle) {
                subtitle.textContent = `Listedeki sızdırmazlık elastomerlerinin "${item.name}" akışkanına karşı kimyasal uyumluluk dereceleri:`;
            }

            const ratingNames = {
                5: "İyi",
                4: "Orta",
                3: "Zayıf",
                2: "Uygun Değil",
                1: "Veri Yok"
            };

            grid.innerHTML = materials.map((mat, idx) => {
                const rating = item.ratings[idx];
                const fullName = materialFullNames[mat] || "";
                return `
                    <div class="bottom-sheet-item">
                        <div class="sheet-elastomer-name">
                            ${mat}
                            <span class="sheet-elastomer-full">(${fullName})</span>
                        </div>
                        <div class="sheet-rating-badge rating-${rating}">
                            <span class="dot ${getDotColorClass(rating)}"></span>
                            ${ratingNames[rating]}
                        </div>
                    </div>
                `;
            }).join("");

            sheet.classList.add("active");
            sheet.removeAttribute("hidden");
            document.body.style.overflow = "hidden"; // disable background scroll
        }

        function closeBottomSheet() {
            const sheet = document.getElementById("bottom-sheet");
            sheet.classList.remove("active");
            sheet.setAttribute("hidden", "");
            document.body.style.overflow = ""; // restore background scroll
        }

        function getDotColorClass(rating) {
            switch(rating) {
                case 5: return "g";
                case 4: return "f";
                case 3: return "p";
                case 2: return "b";
                default: return "n";
            }
        }

        // Close events for bottom sheet
        document.querySelector(".bottom-sheet-close").addEventListener("click", closeBottomSheet);
        document.querySelector(".bottom-sheet-backdrop").addEventListener("click", closeBottomSheet);
        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                closeBottomSheet();
            }
        });

        // Initial load
        loadData();
    </script>
</body>
</html>
